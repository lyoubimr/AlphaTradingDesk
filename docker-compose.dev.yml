# ─────────────────────────────────────────────────────────────────
# AlphaTradingDesk — docker-compose.dev.yml
# Phase 2+: TimescaleDB + Redis + Celery worker + Celery beat
# ─────────────────────────────────────────────────────────────────
services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: atd_dev
      POSTGRES_USER: atd
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atd -d atd_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # entrypoint.sh handles: wait-for-db → migrate → seed → uvicorn
    # --reload is passed as extra arg to uvicorn (dev only)
    command: ["--reload"]
    ports:
      - "8000:8000"
    env_file: .env.dev
    environment:
      # Override the DATABASE_URL host: inside Docker, the DB is reachable
      # via the service name "db", not "localhost".
      DATABASE_URL: postgresql://atd:dev_password@db:5432/atd_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\")' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    volumes:
      - ./src:/app/src
      - ./database:/app/database
      - ./alembic.ini:/app/alembic.ini
      - ./scripts:/app/scripts
      # Uploads — bind-mounted so images survive container restarts in dev
      - ./uploads:/app/uploads

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["celery-worker"]
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql://atd:dev_password@db:5432/atd_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./database:/app/database

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["celery-beat"]
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql://atd:dev_password@db:5432/atd_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./database:/app/database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev       # dev-only: node + Vite HMR (not nginx)
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Bind-mount the whole frontend source for HMR to work
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      # Tell Vite to poll for file changes (needed on macOS Docker Desktop)
      CHOKIDAR_USEPOLLING: "true"
      # Inside Docker, backend is reachable via service name, not localhost
      VITE_API_TARGET: "http://backend:8000"

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
