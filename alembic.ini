# Alembic configuration — AlphaTradingDesk
# sqlalchemy.url is intentionally left empty:
# it is set programmatically in database/migrations/env.py
# from settings.database_url (reads DATABASE_URL env var / .env.dev)

[alembic]
script_location = database/migrations
version_path_separator = os
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
