# ── HTTP — redirect all traffic to HTTPS ────────────────────────────────────
server {
    listen 80;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    root /usr/share/nginx/html;
    index index.html;

    # Certificate generated by scripts/prod/setup-ssl.sh
    # Mounted into the container via docker-compose.prod.yml
    ssl_certificate     /etc/nginx/certs/atd.crt;
    ssl_certificate_key /etc/nginx/certs/atd.key;

    # Modern TLS only — drop TLS 1.0/1.1
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI backend
    # NOTE: proxy_pass ends with NO trailing slash → nginx forwards the full
    # /api/... path as-is to the backend. FastAPI registers all routes under
    # the /api prefix, so the path must be preserved end-to-end.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
